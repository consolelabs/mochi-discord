name: Build and Deploy to Prod

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# ghcr.io push uses the workflow's own GITHUB_TOKEN (no external registry cred).
# Only the kustomize bump to consolelabs/infrastructure needs the bot PAT.
env:
  REGISTRY: ghcr.io
  IMAGE: consolelabs/mochi-discord
  K8S_ENVIRONMENT: prod
  SHA: ${{ github.sha }}

permissions:
  contents: read
  packages: write

jobs:
  setup-build-publish-deploy:
    name: Setup, Build, Publish, and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Overwrite GITHUB_SHA-derived tag for manual re-runs
      - name: Set SHA
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "SHA=${GITHUB_SHA}-$(date +%Y%m%d%H%M%S)" >> "$GITHUB_ENV"

      # Build & Push the Docker image
      - name: Build & Push
        run: |
          docker build -t $REGISTRY/$IMAGE:${GITHUB_REF_NAME} .
          docker push $REGISTRY/$IMAGE:${GITHUB_REF_NAME}
          docker tag $REGISTRY/$IMAGE:${GITHUB_REF_NAME} $REGISTRY/$IMAGE:${SHA}
          docker push $REGISTRY/$IMAGE:${SHA}

      # Setup kustomize
      - name: Setup kustomize
        run: |
          curl -o kustomize --location https://github.com/kubernetes-sigs/kustomize/releases/download/v3.1.0/kustomize_3.1.0_linux_amd64
          chmod u+x ./kustomize
          mv kustomize /tmp
      - name: Checkout consolelabs/infrastructure
        uses: actions/checkout@v4
        with:
          repository: consolelabs/infrastructure
          token: ${{ secrets.INFRA_BOT_PAT }}
          path: ./infrastructure
          ref: main
      - name: Update discord version
        run: |
          cd ./infrastructure/mochi-discord/$K8S_ENVIRONMENT
          git config user.name "consolelabs-bot"
          git config user.email "consolelabs-bot@users.noreply.github.com"
          /tmp/kustomize edit set image $REGISTRY/$IMAGE=$REGISTRY/$IMAGE:${SHA}
          git commit -am "[skip ci] mochi-discord ${K8S_ENVIRONMENT} image update"
          git push origin main
