name: Run unit tests
on: [pull_request]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.x'
      - uses: actions/setup-node@v7
        with:
          node-version: 18
          
      - name: Restore Cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/pnpm
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
  
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip make build-essential g++ libcairo2-dev libjpeg-dev libpango1.0-dev libgif-dev imagemagick
          pip3 install --upgrade pip
          # Pin pnpm@9: unpinned pulls pnpm@11 which needs Node >=22.13, but this job is node:18
          # and the lockfile is lockfileVersion 9.0 (same bomb that broke the prod Docker build).
          npm install -g pnpm@9
          pnpm i
          
      - name: Save Cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/pnpm
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Run tests
        env:
          SWAGGER_URL: ${{ secrets.SWAGGER_URL_DEV }}
        run: |
          pnpm test:ci

  